services:
    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "80:80"
            - "443:443"
            - "5671:5671"
        environment:
            - DOMAIN=${DOMAIN:-localhost}
        command: >
            /bin/sh -c
            "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
            && nginx -g 'daemon off;'"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
            - ./nginx/home:/usr/share/nginx/html:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro
            - certbot-webroot:/var/www/certbot:ro
        depends_on:
            - api
            - grafana
            - rabbitmq
        restart: unless-stopped

    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-root}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-root}
            - GF_PLUGINS_PREINSTALL=grafana-clock-panel,influxdata-flightsql-datasource
        volumes:
            - grafana-data:/var/lib/grafana
            - ./ui/grafana.ini:/etc/grafana/grafana.ini
            - ./ui/provisioning:/etc/grafana/provisioning
            - ./ui/dashboards:/var/lib/grafana/dashboards
        restart: unless-stopped
        depends_on:
            - influxdb3-core
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
            interval: 10s
            timeout: 5s
            retries: 5

    influxdb3-core:
        container_name: influxdb3-core
        image: influxdb:3-core
        user: root
        ports:
            - "127.0.0.1:8181:8181"
        command:
            - influxdb3
            - serve
            - --node-id=node0
            - --object-store=file
            - --data-dir=/var/lib/influxdb3/data
            - --plugin-dir=/var/lib/influxdb3/plugins
            - --without-auth
        volumes:
            - influxdb3-data:/var/lib/influxdb3/data
            - influxdb3-plugins:/var/lib/influxdb3/plugins
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
            interval: 15s
            timeout: 10s
            retries: 20
            start_period: 60s

    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq
        restart: unless-stopped
        ports:
          - "5672:5672"
          - "15672:15672"
          - "1883:1883"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-root}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-root}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            retries: 3
            timeout: 10s
            interval: 30s

    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: api
        restart: unless-stopped
        environment:
            - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-dev-key}
            - DEBUG=${DEBUG:-False}
            - ALLOWED_HOSTS=localhost,127.0.0.1,api,nginx,$DOMAIN,*
            - RABBITMQ_HOST=rabbitmq
            - RABBITMQ_PORT=5672
            - RABBITMQ_USER=${RABBITMQ_USER:-root}
            - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-root}
            - INFLUXDB_URL=http://influxdb3-core:8181
            - INFLUXDB_ORG=${INFLUXDB_ORG:-lorawan}
            - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-lorawan_data}
            - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-test-token}
            - API_KEY=${API_KEY:-your-api-key}
            - CORS_ALLOWED_ORIGINS=${DOMAIN:-http://localhost}
        volumes:
            - ./api:/app
        depends_on:
            - rabbitmq
            - influxdb3-core
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 15s


    worker:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: worker
        restart: unless-stopped
        command: python worker.py
        environment:
            - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-dev-key}
            - DEBUG=${DEBUG:-False}
            - RABBITMQ_HOST=rabbitmq
            - RABBITMQ_PORT=5672
            - RABBITMQ_USER=${RABBITMQ_USER:-root}
            - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-root}
            - INFLUXDB_URL=http://influxdb3-core:8181
            - INFLUXDB_ORG=${INFLUXDB_ORG:-lorawan}
            - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-lorawan_data}
            - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-test-token}
        volumes:
            - ./api:/app
        depends_on:
            rabbitmq:
                condition: service_healthy
            influxdb3-core:
                condition: service_healthy

volumes:
    grafana-data:
    influxdb3-data:
    influxdb3-plugins:
    rabbitmq_data:
    certbot-webroot:

networks:
    default:
        driver: bridge