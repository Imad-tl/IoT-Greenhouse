events {}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Handle WebSocket upgrade headers
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Redirect HTTP to HTTPS
    server {
        
        listen 80;
        server_name ${DOMAIN};

        # Allow ACME challenge for certificate renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }

    }

    # HTTPS server
    server {

        listen 443 ssl;
        server_name ${DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Custom 404
        error_page 404 /not-found.html;
        location = /not-found.html {
            root     /usr/share/nginx/html;
            internal;
        }

        # Homepage : /
        location = / {
            root  /usr/share/nginx/html;
            index index.html;
        }

        # Static assets (css, etc.)
        location / {
            root      /usr/share/nginx/html;
            try_files $uri =404;
        }

        # Cloud API : /api/
        location /api/ {
            proxy_pass         http://api:8000;
            proxy_redirect     off;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

        }

        # Grafana UI : /ui/
        location /ui/ {
            proxy_pass         http://grafana:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;

            # WebSocket support (Grafana Live)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
        }

        # RabbitMQ Management UI : /rabbitmq/
        location /rabbitmq/ {
            proxy_pass         http://rabbitmq:15672/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (RabbitMQ management uses WS)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}

# Proxy TCP pour RabbitMQ AMQP (port 5672) via TLS
stream {

    server {
        
        listen     5671 ssl;
        proxy_pass rabbitmq:5672;

        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        
        ssl_protocols       TLSv1.2 TLSv1.3;

    }

}
