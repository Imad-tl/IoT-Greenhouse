events {}

http {
    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name vps.rayanemerlin.com;

        # Allow ACME challenge for certificate renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name vps.rayanemerlin.com;

        ssl_certificate     /etc/letsencrypt/live/vps.rayanemerlin.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vps.rayanemerlin.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Cloud API — strip /api prefix before forwarding to Django
        location /api/ {
            proxy_pass         http://api:8000/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Grafana UI — keep /ui prefix (serve_from_sub_path = true)
        location /ui/ {
            proxy_pass         http://grafana:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
