<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IOT Greenhouse</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>

    <header>

        <h1>IOT <span>Greenhouse</span></h1>
        <p>Tableau de bord de supervision LoRaWAN</p>

    </header>

    <div class="cards">

        <a class="card" href="/ui/">
            <div class="icon">📊</div>
            <div class="label">Grafana</div>
            <div class="path">/ui/</div>
            <div class="desc">Dashboards & visualisation des capteurs</div>
        </a>

        <a class="card" href="/api/">
            <div class="icon">⚡</div>
            <div class="label">API</div>
            <div class="path">/api/</div>
            <div class="desc">Backend Django — webhooks TTN & données</div>
        </a>

        <a class="card" href="/rabbitmq/">
            <div class="icon">🐇</div>
            <div class="label">RabbitMQ</div>
            <div class="path">/rabbitmq/</div>
            <div class="desc">Management UI — files de messages</div>
        </a>

    </div>

    <footer>IOT Greenhouse &mdash; LoRaWAN Cloud Backend</footer>

</body>

</html>
